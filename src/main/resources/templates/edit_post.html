<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Post</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Blogio</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto me-4">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <!-- Link to All Tags -->
                <li class="nav-item">
                    <a class="nav-link" href="/tags">
                        <i class="fas fa-tag"></i> All Tags
                    </a>
                </li>
                <li class="nav-item" th:if="${#authentication.principal != null}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="neumorphic-card">
        <h2>Edit Post</h2>
        <form th:action="@{'/posts/' + ${post.id} + '/edit'}" th:object="${post}" method="post"
              enctype="multipart/form-data" class="mt-3">

            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control neumorphic-input"
                       id="title" placeholder="Update post title" required/>
            </div>

            <div class="mb-3">
                <label for="content" class="form-label">Content</label>
                <textarea th:field="*{content}" class="form-control neumorphic-input" id="content"
                          rows="7" placeholder="Update your post here..." required></textarea>
            </div>

            <!-- Plain text input for tags (comma-separated) -->
            <div class="mb-3">
                <label for="tagsInput" class="form-label">Tags (comma-separated)</label>
                <input type="text" class="form-control neumorphic-input" id="tagsInput" name="tags"
                       placeholder="e.g. Java, Spring, Boot" th:value="${tagsInput}" />
                <div class="form-text">
                    If you leave this blank, the existing tags will be cleared.
                    Provide comma-separated tags to update them.
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Image</label>
                <div th:if="${post.imagePath != null}" class="mb-3">
                    <img th:src="${post.imagePath}" alt="Current Image" class="img-fluid post-image-full"/>
                </div>
                <label for="imageFile" class="form-label">Change Image (Optional)</label>
                <input type="file" class="form-control neumorphic-input" id="imageFile" name="imageFile"
                       accept="image/*"/>
                <div class="form-text">Uploading a new image will replace the current one.</div>
            </div>

            <button type="submit" class="btn btn-primary neumorphic-button">
                <i class="fas fa-paper-plane"></i> Update
            </button>
            <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-secondary ms-2 neumorphic-button">Cancel</a>
        </form>
    </div>
</div>

<footer class="footer text-center py-3">
    <div class="container">
        <span>&copy; 2025 Blogio. All rights reserved.</span>
    </div>
</footer>

<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
