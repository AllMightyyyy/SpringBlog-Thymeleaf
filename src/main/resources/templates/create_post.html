<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Post</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Blogio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto me-4">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/tags">
                        <i class="fas fa-tag"></i> All Tags
                    </a>
                </li>
                <li class="nav-item" th:if="${#authentication.principal != null}">
                    <a class="nav-link" href="/my-posts">
                        <i class="fas fa-list"></i> My Posts
                    </a>
                </li>
                <li class="nav-item" th:if="${#authentication.principal != null}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </form>
                </li>
                <li class="nav-item" th:if="${#authentication.principal == null}">
                    <a class="nav-link" href="/login">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                </li>
                <li class="nav-item" th:if="${#authentication.principal == null}">
                    <a class="nav-link" href="/register">
                        <i class="fas fa-user-plus"></i> Register
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="neumorphic-card">
        <h2 class="mb-4">Create New Post</h2>
        <form th:action="@{/posts/create}" th:object="${post}" method="post" enctype="multipart/form-data" id="createPostForm">
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control neumorphic-input"
                       id="title" placeholder="Enter post title" required/>
            </div>

            <div class="mb-3">
                <label for="editor" class="form-label">Content</label>
                <div id="editor" style="height: 300px; background-color: #2a2a2a;"></div>
            </div>

            <input type="hidden" th:field="*{content}" id="quillHtmlContent"/>

            <div class="mb-3">
                <label for="tagsInput" class="form-label">Tags (comma-separated)</label>
                <input type="text" class="form-control neumorphic-input" id="tagsInput" name="tagsInput" placeholder="e.g. Java, Spring, Boot" />
            </div>

            <div class="mb-3">
                <label for="imageFile" class="form-label">Image (Optional)</label>
                <input type="file" class="form-control neumorphic-input" id="imageFile" name="imageFile"
                       accept="image/*" />
                <div class="form-text">Supported formats: JPG, PNG, GIF. Max size: 5MB.</div>
            </div>

            <button type="submit" class="btn btn-primary neumorphic-button">
                <i class="fas fa-paper-plane"></i> Publish
            </button>
            <a href="/" class="btn btn-secondary ms-2 neumorphic-button">Cancel</a>
        </form>
    </div>
</div>

<footer class="footer text-center py-3">
    <div class="container">
        <span class="text-light">&copy; 2025 Blogio. All rights reserved.</span>
    </div>
</footer>

<script src="/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    var quill = new Quill('#editor', {
        theme: 'snow'
    });

    var form = document.getElementById('createPostForm');
    form.onsubmit = function() {
        document.getElementById('quillHtmlContent').value = quill.root.innerHTML;
    };
</script>

</body>
</html>
